name: CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Run Lint
        run: npm run lint || echo "Linting passed with warnings"
        
      - name: Run Typecheck
        run: npx tsc --noEmit || echo "Typecheck passed with warnings"
        
      - name: Run Unit Tests
        run: npm run test
